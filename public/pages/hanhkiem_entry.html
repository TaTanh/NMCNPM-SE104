<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhập hạnh kiểm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <style>
        /* Reset một số style từ file gốc */
        .page-title {
            font-size: 16px !important;
            font-weight: 600 !important;
        }

        .user-info span {
            font-size: 12px !important;
        }

        .filter-label {
            font-size: 12px !important;
            margin-bottom: 3px !important;
        }

        .filters-row {
            margin-bottom: 12px !important;
        }

        .filters-row select {
            font-size: 12px !important;
            padding: 5px 8px !important;
        }

        .btn-primary {
            font-size: 12px !important;
            padding: 6px 12px !important;
        }

        .content {
            padding: 15px !important;
        }

        /* Style cho bảng hạnh kiểm */
        .hanhkiem-container {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .hanhkiem-header-info {
            background: #f5f5f5;
            padding: 10px 12px;
            border-radius: 3px;
            margin-bottom: 10px;
        }

        .hanhkiem-header-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .hanhkiem-header-label {
            font-weight: 600;
            color: #666;
        }

        .hanhkiem-header-value {
            color: #333;
        }

        .hanhkiem-hints {
            background: #f0f8ff;
            border: 1px solid #b3d9ff;
            padding: 6px 8px;
            border-radius: 3px;
            font-size: 11px;
            color: #0066cc;
            margin-top: 6px;
            line-height: 1.3;
        }

        .hanhkiem-hints strong {
            color: #004499;
        }

        .hanhkiem-table-wrapper {
            overflow-x: auto;
            margin-top: 12px;
        }

        .hanhkiem-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .hanhkiem-table th,
        .hanhkiem-table td {
            border: 1px solid #ddd;
            padding: 6px 8px;
            text-align: center;
        }

        .hanhkiem-table th {
            background-color: #f5f5f5;
            font-weight: 600;
            color: #333;
            font-size: 11px;
        }

        .hanhkiem-table tbody tr:hover {
            background-color: #f9f9f9;
        }

        .hanhkiem-table td:nth-child(1) {
            width: 40px;
        }

        .hanhkiem-table td:nth-child(2) {
            width: 100px;
            text-align: left;
        }

        .hanhkiem-table td:nth-child(3) {
            min-width: 150px;
            text-align: left;
        }

        .hanhkiem-input {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 2px;
            text-align: center;
            font-size: 12px;
        }

        .hanhkiem-input:focus {
            outline: none;
            border-color: #2196F3;
            background-color: #e3f2fd;
        }

        .hanhkiem-input.error {
            border-color: #f44336;
            background-color: #ffebee;
        }

        .hanhkiem-input.success {
            border-color: #4CAF50;
            background-color: #e8f5e9;
        }

        .hanhkiem-button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-save-all {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .btn-save-all:hover {
            background-color: #45a049;
        }

        .btn-save-all:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .hanhkiem-empty-message {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 250px;
            color: #999;
            font-size: 12px;
        }

        .btn-delete-hanhkiem {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete-hanhkiem:hover {
            background-color: #da190b;
        }

        .btn-delete-hanhkiem:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
</head>

<body class="dashboard-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/uit_logo.png" alt="UIT Logo">
            <span>QL Học Sinh</span>
        </div>

        <nav class="sidebar-menu">
            <a href="/pages/dashboard.html">Dashboard</a>
            <a href="/pages/students.html">Quản lý học sinh</a>
            <a href="/pages/classes.html">Quản lý lớp học</a>
            <a href="/pages/subject_list.html">Quản lý môn học</a>
            <a href="/pages/grade_entry_select.html">Nhập điểm</a>
            <a href="/pages/hanhkiem_entry.html" class="active">Nhập hạnh kiểm</a>
            <a href="/pages/grade_select.html">Bảng điểm</a>
            <a href="/pages/student_transcript.html">Tra cứu điểm HS</a>
            <a href="/pages/class_summary.html">Tổng kết lớp</a>
            <a href="/pages/reports.html">Báo cáo tổng kết</a>
            <a href="/pages/teaching_assignment.html" id="menuTeaching" style="display:none;">Phân công giảng dạy</a>
            <a href="/pages/users.html" id="menuUsers" style="display:none;">Quản lý người dùng</a>
        </nav>

    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <header class="topbar">
            <div class="page-title">Nhập hạnh kiểm</div>
            <div class="user-info">
                <span id="userGreeting">Xin chào</span>
                <img src="/assets/user.png" class="avatar" alt="user">
                <button class="btn btn-outline btn-sm" onclick="logout()" style="margin-left:10px;font-size:11px;padding:4px 10px;">Đăng xuất</button>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="content">
            <!-- FILTER ROW -->
            <div class="filters-row">
                <div class="filter-item">
                    <label class="filter-label">Năm học <span style="color:red;">*</span></label>
                    <select id="yearFilter" required>
                        <option value="">-- Chọn năm học --</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="filter-label">Học kỳ <span style="color:red;">*</span></label>
                    <select id="semesterFilter" required>
                        <option value="">-- Chọn học kỳ --</option>
                        <option value="HK1">Học kỳ 1</option>
                        <option value="HK2">Học kỳ 2</option>
                        <option value="CN">Cả năm</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="filter-label">Khối <span style="color:red;">*</span></label>
                    <select id="khoiFilter" required>
                        <option value="">-- Chọn khối --</option>
                        <option value="K10">Khối 10</option>
                        <option value="K11">Khối 11</option>
                        <option value="K12">Khối 12</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="filter-label">Lớp <span style="color:red;">*</span></label>
                    <select id="classFilter" required>
                        <option value="">-- Chọn lớp --</option>
                    </select>
                </div>

                <div class="filter-item" style="display:flex; align-items:flex-end;">
                    <button class="btn btn-primary" id="btnLoadClass">Tải danh sách</button>
                </div>
            </div>

            <!-- MAIN CONTAINER -->
            <div class="hanhkiem-container" id="mainContainer">
                <div class="hanhkiem-empty-message">
                    Vui lòng chọn năm học, học kỳ và lớp, sau đó nhấn "Tải danh sách"
                </div>
            </div>

        </div>
    </div>

    <script>
        // ========== KIỂM TRA QUYỀN TRUY CẬP ==========
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = '/pages/login.html';
                return;
            }

            // Chỉ GVCN và ADMIN mới được nhập hạnh kiểm
            if (user.vaiTro !== 'GVCN' && user.vaiTro !== 'ADMIN') {
                toastError('Bạn không có quyền nhập hạnh kiểm');
                setTimeout(() => {
                    window.location.href = '/pages/dashboard.html';
                }, 2000);
                return;
            }

            document.getElementById('userGreeting').textContent = `Xin chào, ${user.hoTen}`;
            
            // Show menu phân công giảng dạy cho Admin
            if (user.vaiTro === 'ADMIN') {
                document.getElementById('menuTeaching').style.display = 'block';
                document.getElementById('menuUsers').style.display = 'block';
            }

            loadFilters();
        });

        // ========== LOAD FILTERS ==========
        async function loadFilters() {
            try {
                // Load lớp
                const classesRes = await fetch('/api/classes');
                const classes = await classesRes.json();
                const classSelect = document.getElementById('classFilter');
                classes.forEach(c => {
                    const option = document.createElement('option');
                    option.value = c.malop;
                    option.textContent = c.tenlop;
                    classSelect.appendChild(option);
                });

                // Load năm học
                const yearsRes = await fetch('/api/settings/school-years');
                const years = await yearsRes.json();
                const yearSelect = document.getElementById('yearFilter');
                years.forEach(y => {
                    const option = document.createElement('option');
                    option.value = y.manamhoc;
                    option.textContent = y.tennamhoc;
                    yearSelect.appendChild(option);
                });

                // Set năm học hiện tại
                if (years.length > 0) {
                    yearSelect.value = years[0].manamhoc;
                }
            } catch (error) {
                console.error('Lỗi load filters:', error);
                toastError('Không thể tải danh sách lớp và năm học');
            }
        }

        // ========== LOAD DANH SÁCH HẠNH KIỂM ==========
        let currentStudents = [];

        document.getElementById('btnLoadHanhKiem').addEventListener('click', loadHanhKiem);

        async function loadHanhKiem() {
            const maLop = document.getElementById('classFilter').value;
            const maNamHoc = document.getElementById('yearFilter').value;
            const maHocKy = document.getElementById('semesterFilter').value;

            if (!maLop || !maNamHoc || !maHocKy) {
                toastWarning('Vui lòng chọn đầy đủ lớp, năm học và học kỳ');
                return;
            }

            try {
                // Lấy danh sách học sinh trong lớp
                const studentsRes = await fetch(`/api/classes/${maLop}/students`);
                if (!studentsRes.ok) throw new Error('Không thể tải danh sách học sinh');
                const students = await studentsRes.json();

                // Lấy hạnh kiểm đã nhập
                const hanhkiemRes = await fetch(`/api/hanhkiem/lop/${maLop}?maNamHoc=${maNamHoc}&maHocKy=${maHocKy}`);
                const hanhkiemData = await hanhkiemRes.json();

                const hanhkiemMap = {};
                if (hanhkiemData.success && hanhkiemData.data) {
                    hanhkiemData.data.forEach(hk => {
                        hanhkiemMap[hk.mahocsinh] = {
                            diemhanhkiem: hk.diemhanhkiem || '',
                            xeploai: hk.xeploai,
                            ghichu: hk.ghichu || ''
                        };
                    });
                }

                currentStudents = students.map(hs => ({
                    ...hs,
                    diemhanhkiem: hanhkiemMap[hs.mahocsinh]?.diemhanhkiem || '',
                    xeploai: hanhkiemMap[hs.mahocsinh]?.xeploai || '',
                    ghichu: hanhkiemMap[hs.mahocsinh]?.ghichu || ''
                }));

                renderHanhKiemTable();

                const className = document.getElementById('classFilter').selectedOptions[0].text;
                const yearName = document.getElementById('yearFilter').selectedOptions[0].text;
                const semester = maHocKy == 1 ? 'Học kỳ 1' : 'Học kỳ 2';
                document.getElementById('classInfo').textContent = `${className} - ${yearName} - ${semester} (${currentStudents.length} học sinh)`;

            } catch (error) {
                console.error('Lỗi:', error);
                toastError('Lỗi khi tải danh sách: ' + error.message);
            }
        }

        // ========== HÀM TÍNH XẾP LOẠI TỪ ĐIỂM ==========
        function tinhXepLoaiTuDiem(diem) {
            if (!diem || diem === '') return '';
            const diemNum = parseFloat(diem);
            if (isNaN(diemNum)) return '';
            
            if (diemNum >= 80) return 'Tốt';
            if (diemNum >= 65) return 'Khá';
            if (diemNum >= 50) return 'Trung bình';
            return 'Yếu';
        }

        // ========== RENDER BẢNG ==========
        function renderHanhKiemTable() {
            const tbody = document.getElementById('hanhkiemTableBody');

            if (currentStudents.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Không có học sinh trong lớp</td></tr>';
                return;
            }

            tbody.innerHTML = currentStudents.map((hs, index) => `
                <tr>
                    <td style="text-align:center;">${index + 1}</td>
                    <td>${hs.mahocsinh}</td>
                    <td>${hs.hoten}</td>
                    <td>${hs.gioitinh || ''}</td>
                    <td>
                        <input type="number" 
                               class="form-control hanhkiem-diem" 
                               data-mahocsinh="${hs.mahocsinh}"
                               value="${hs.diemhanhkiem || ''}"
                               min="0" 
                               max="100" 
                               step="1"
                               placeholder="0-100"
                               style="width:100px;">
                    </td>
                    <td>
                        <span class="hanhkiem-xeploai" data-mahocsinh="${hs.mahocsinh}" style="font-weight:500;">
                            ${hs.xeploai || ''}
                        </span>
                    </td>
                    <td>
                        <input type="text" class="form-control hanhkiem-note" 
                               data-mahocsinh="${hs.mahocsinh}" 
                               value="${hs.ghichu || ''}" 
                               placeholder="Ghi chú (nếu có)">
                    </td>
                </tr>
            `).join('');

            // Gắn event cho input điểm - tự động tính xếp loại
            tbody.querySelectorAll('.hanhkiem-diem').forEach(input => {
                input.addEventListener('input', (e) => {
                    const maHocSinh = e.target.dataset.mahocsinh;
                    const diem = e.target.value;
                    const student = currentStudents.find(s => s.mahocsinh == maHocSinh);
                    
                    if (student) {
                        student.diemhanhkiem = diem;
                        student.xeploai = tinhXepLoaiTuDiem(diem);
                        
                        // Cập nhật span xếp loại
                        const spanElement = e.target.closest('tr').querySelector('.hanhkiem-xeploai');
                        if (spanElement) {
                            spanElement.textContent = student.xeploai;
                        }
                    }
                });
            });

            tbody.querySelectorAll('.hanhkiem-note').forEach(input => {
                input.addEventListener('change', (e) => {
                    const maHocSinh = e.target.dataset.mahocsinh;
                    const student = currentStudents.find(s => s.mahocsinh == maHocSinh);
                    if (student) {
                        student.ghichu = e.target.value;
                    }
                });
            });
        }

        // ========== LƯU TẤT CẢ ==========
        document.getElementById('btnSaveAll').addEventListener('click', async () => {
            const maLop = document.getElementById('classFilter').value;
            const maNamHoc = document.getElementById('yearFilter').value;
            const maHocKy = document.getElementById('semesterFilter').value;

            if (!maLop || !maNamHoc || !maHocKy) {
                toastWarning('Vui lòng chọn lớp, năm học và học kỳ trước');
                return;
            }

            // Lọc chỉ học sinh đã nhập điểm hạnh kiểm
            const hanhKiemList = currentStudents
                .filter(hs => hs.diemhanhkiem && hs.diemhanhkiem !== '')
                .map(hs => ({
                    maHocSinh: hs.mahocsinh,
                    maNamHoc: parseInt(maNamHoc),
                    maHocKy: parseInt(maHocKy),
                    diemHanhKiem: parseFloat(hs.diemhanhkiem),
                    xepLoai: hs.xeploai,
                    ghiChu: hs.ghichu || null
                }));

            if (hanhKiemList.length === 0) {
                toastWarning('Chưa có học sinh nào được nhập điểm hạnh kiểm');
                return;
            }

            try {
                const user = getCurrentUser();
                const response = await fetch('/api/hanhkiem/bulk-upsert', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-user-id': user.maNguoiDung
                    },
                    body: JSON.stringify({ hanhKiemList })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Lỗi khi lưu hạnh kiểm');
                }

                toastSuccess(`Đã lưu hạnh kiểm cho ${hanhKiemList.length} học sinh`);
                loadHanhKiem(); // Reload để cập nhật

            } catch (error) {
                console.error('Lỗi:', error);
                toastError('Lỗi: ' + error.message);
            }
        });

        // ========== THỐNG KÊ ==========
        document.getElementById('btnStats').addEventListener('click', async () => {
            const maLop = document.getElementById('classFilter').value;
            const maNamHoc = document.getElementById('yearFilter').value;
            const maHocKy = document.getElementById('semesterFilter').value;

            if (!maLop || !maNamHoc || !maHocKy) {
                toastWarning('Vui lòng chọn lớp, năm học và học kỳ trước');
                return;
            }

            try {
                const response = await fetch(`/api/hanhkiem/thongke/lop/${maLop}?maNamHoc=${maNamHoc}&maHocKy=${maHocKy}`);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Lỗi khi lấy thống kê');
                }

                const stats = result.data;
                const total = stats.reduce((sum, item) => sum + parseInt(item.soluong), 0);

                let html = `
                    <table class="data-table" style="margin-top:0;">
                        <thead>
                            <tr>
                                <th>Xếp loại</th>
                                <th>Số lượng</th>
                                <th>Tỷ lệ</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                stats.forEach(item => {
                    html += `
                        <tr>
                            <td><strong>${item.xeploai}</strong></td>
                            <td style="text-align:center;">${item.soluong}</td>
                            <td style="text-align:center;">${item.tile}%</td>
                        </tr>
                    `;
                });

                html += `
                        <tr style="background-color:#f0f0f0; font-weight:bold;">
                            <td>Tổng</td>
                            <td style="text-align:center;">${total}</td>
                            <td style="text-align:center;">100%</td>
                        </tr>
                    </tbody>
                    </table>
                `;

                document.getElementById('statsContent').innerHTML = html;
                document.getElementById('statsModal').classList.add('show');

            } catch (error) {
                console.error('Lỗi:', error);
                toastError('Lỗi: ' + error.message);
            }
        });

        document.getElementById('closeStatsBtn').onclick = 
        document.getElementById('btnCloseStats').onclick = () => {
            document.getElementById('statsModal').classList.remove('show');
        };

        document.getElementById('statsModal').addEventListener('click', (e) => {
            if (e.target.id === 'statsModal') {
                document.getElementById('statsModal').classList.remove('show');
            }
        });
    </script>

</body>
</html>
