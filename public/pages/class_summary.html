<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tổng kết lớp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/layout/styles.css">
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
    <style>
        .page-title {
            font-size: 16px !important;
            font-weight: 600 !important;
        }

        .user-info span {
            font-size: 12px !important;
        }

        .filter-label {
            font-size: 12px !important;
            margin-bottom: 3px !important;
        }

        .filters-row {
            margin-bottom: 12px !important;
        }

        .filters-row select {
            font-size: 12px !important;
            padding: 5px 8px !important;
        }

        .btn-primary {
            font-size: 12px !important;
            padding: 6px 12px !important;
        }

        .content {
            padding: 15px !important;
        }

        .summary-container {
            background: white;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .summary-header {
            background: #f5f5f5;
            padding: 10px 12px;
            border-radius: 3px;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .summary-header-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .summary-table-wrapper {
            overflow-x: auto;
            margin-top: 12px;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        .summary-table th,
        .summary-table td {
            border: 1px solid #ddd;
            padding: 5px 6px;
            text-align: center;
        }

        .summary-table th {
            background-color: #f5f5f5;
            font-weight: 600;
            color: #333;
            font-size: 10px;
        }

        .summary-table tbody tr:hover {
            background-color: #f9f9f9;
        }

        .summary-table td:nth-child(1) {
            width: 35px;
        }

        .summary-table td:nth-child(2) {
            width: 90px;
            text-align: left;
        }

        .summary-table td:nth-child(3) {
            min-width: 130px;
            text-align: left;
        }

        .complete-badge {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
        }

        .incomplete-badge {
            background-color: #ffebee;
            color: #c62828;
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
        }

        .empty-message {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 250px;
            color: #999;
            font-size: 12px;
        }

        .xep-loai-input {
            width: 100%;
            padding: 3px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-size: 10px;
            text-align: center;
        }

        .xep-loai-input:focus {
            outline: none;
            border-color: #2196F3;
            background-color: #e3f2fd;
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-save {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .btn-save:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body class="dashboard-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="/assets/uit_logo.png" alt="UIT Logo">
            <span>QL Học Sinh</span>
        </div>

        <nav class="sidebar-menu">
            <a href="/pages/dashboard.html">Dashboard</a>
            <a href="/pages/students.html">Quản lý học sinh</a>
            <a href="/pages/classes.html">Quản lý lớp học</a>
            <a href="/pages/subject_list.html">Quản lý môn học</a>
            <a href="/pages/grade_entry_select.html">Nhập điểm</a>
            <a href="/pages/hanhkiem_entry.html">Nhập hạnh kiểm</a>
            <a href="/pages/grade_select.html">Bảng điểm</a>
            <a href="/pages/student_transcript.html">Tra cứu điểm HS</a>
            <a href="/pages/class_summary.html" class="active">Tổng kết lớp</a>
            <a href="/pages/reports.html">Báo cáo tổng kết</a>
            <a href="/pages/teaching_assignment.html" id="menuTeaching" style="display:none;">Phân công giảng dạy</a>
            <a href="/pages/users.html" id="menuUsers" style="display:none;">Quản lý người dùng</a>
        </nav>

    </aside>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <header class="topbar">
            <div class="page-title">Tổng kết lớp</div>
            <div class="user-info">
                <span id="userGreeting">Xin chào</span>
                <img src="/assets/user.png" class="avatar" alt="user">
                <button class="btn btn-outline btn-sm" onclick="logout()" style="margin-left:10px;font-size:11px;padding:4px 10px;">Đăng xuất</button>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="content">
            <!-- FILTER ROW -->
            <div class="filters-row">
                <div class="filter-item">
                    <label class="filter-label">Năm học <span style="color:red;">*</span></label>
                    <select id="yearFilter" required>
                        <option value="">-- Chọn năm học --</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="filter-label">Học kỳ <span style="color:red;">*</span></label>
                    <select id="semesterFilter" required>
                        <option value="">-- Chọn học kỳ --</option>
                        <option value="HK1">Học kỳ 1</option>
                        <option value="HK2">Học kỳ 2</option>
                        <option value="CN">Cả năm</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="filter-label">Khối <span style="color:red;">*</span></label>
                    <select id="khoiFilter" required>
                        <option value="">-- Chọn khối --</option>
                        <option value="K10">Khối 10</option>
                        <option value="K11">Khối 11</option>
                        <option value="K12">Khối 12</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="filter-label">Lớp <span style="color:red;">*</span></label>
                    <select id="classFilter" required>
                        <option value="">-- Chọn lớp --</option>
                    </select>
                </div>

                <div class="filter-item" style="display:flex; align-items:flex-end;">
                    <button class="btn btn-primary" id="btnLoadSummary">Xem tổng kết</button>
                </div>
            </div>

            <!-- MAIN CONTAINER -->
            <div class="summary-container" id="mainContainer">
                <div class="empty-message">
                    Vui lòng chọn năm học, học kỳ và lớp, sau đó nhấn "Xem tổng kết"
                </div>
            </div>

        </div>
    </div>

    <script src="/js/class_summary.js"></script>
</body>
</html>
